<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCPを学ぼう｜一乗谷友愛会 職員研修</title>
<style>
  :root{
    --ink:#3a2e33; --ink2:#574c52; --line:#e7dcc4; --paper:#fbf7e6; --card:#ffffff;
    --sakura:#d6539a; --beni:#b23d80; --sakura-tint:#fceaf2;
    --wakaba:#7aa83f; --wakaba-tint:#eef4e0; --amber:#cf9a45;
    --ng:#c0453f; --ng-soft:#fbeceb;
    --r-sm:10px; --r:16px; --r-lg:22px;
    --sh1:0 1px 2px rgba(58,46,51,.05); --sh2:0 4px 14px rgba(58,46,51,.07); --sh3:0 12px 30px rgba(58,46,51,.10);
    --ff-disp:"Hiragino Maru Gothic ProN","Yu Gothic Medium","Yu Gothic","Meiryo",sans-serif;
    --ff-body:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",system-ui,sans-serif;
    --ff-min:"Hiragino Mincho ProN","Yu Mincho",YuMincho,serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:var(--ff-body);color:var(--ink);background:var(--paper);line-height:1.8;font-size:17px;overscroll-behavior:none}
  .eyebrow{font-family:var(--ff-disp);font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--sakura)}
  #app{max-width:480px;margin:0 auto;min-height:100%;background:var(--paper);position:relative;display:flex;flex-direction:column}

  .topbar{position:sticky;top:0;z-index:20;background:var(--sakura);color:#fff;padding:13px 18px;
    display:flex;align-items:center;gap:10px;border-bottom:3px dashed rgba(255,255,255,.6);box-shadow:0 3px 10px rgba(178,61,128,.18)}
  .topbar .back{background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:10px;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center}
  .topbar .title{font-family:var(--ff-disp);font-weight:800;font-size:16px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topbar .prog{font-size:12px;font-weight:700;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px}
  .topbar .fsctl{display:flex;gap:4px}
  .topbar .fsctl button{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;font-family:var(--ff-disp);font-weight:800;font-size:13px;padding:5px 8px;cursor:pointer;line-height:1}
  .topbar .fsctl button:active{transform:translateY(1px)}

  .screen{flex:1;padding:18px 18px 116px;animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* hero */
  .hero{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:20px 20px 22px;box-shadow:var(--sh2);margin-bottom:16px;overflow:hidden}
  .hero:after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%,var(--sakura-tint),transparent 70%);pointer-events:none}
  .hero-row{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
  .hero-maru{width:80px;height:auto;flex-shrink:0;filter:drop-shadow(0 5px 9px rgba(58,46,51,.16))}
  .hero h1{font-family:var(--ff-disp);font-size:23px;line-height:1.42;margin:4px 0 0;color:var(--ink);letter-spacing:.01em}
  .hero .lead{font-size:14px;color:var(--ink2);margin:14px 0 0;position:relative;z-index:1}
  .prog-wrap{margin-top:16px;position:relative;z-index:1}
  .prog-track{height:11px;background:var(--paper);border:1px solid var(--line);border-radius:20px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--sakura),var(--beni));border-radius:20px;transition:width .6s cubic-bezier(.4,0,.2,1)}
  .prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--ink2);margin-top:7px;font-weight:600}

  /* name box */
  .name-box{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:20px;box-shadow:var(--sh1)}
  .name-box label{font-size:12px;font-weight:800;letter-spacing:.03em;color:var(--ink2);display:block;margin-bottom:6px}
  .name-box input,.name-box select{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px 13px;font-size:16px;font-family:inherit;background:var(--paper);color:var(--ink)}
  .name-box input:focus,.name-box select:focus{outline:none;border-color:var(--sakura);background:#fff}
  .name-box .req-star{color:var(--ng);font-size:12px;margin-left:6px;font-weight:800}
  .name-box input.miss{border-color:var(--ng);background:var(--ng-soft)}
  .nm-hint{font-size:12px;color:var(--ng);margin-top:6px;display:none;font-weight:600}

  .sec-h{font-family:var(--ff-disp);font-size:16px;font-weight:800;color:var(--ink);margin:4px 2px 14px}

  /* learning path (signature) */
  .path{position:relative}
  .unit{display:flex;gap:13px;cursor:pointer;padding-bottom:14px;position:relative}
  .rail{position:relative;width:36px;flex-shrink:0;display:flex;justify-content:center}
  .rail:before{content:"";position:absolute;top:10px;bottom:-10px;left:50%;transform:translateX(-50%);border-left:2px dashed var(--line)}
  .unit:last-child .rail:before{display:none}
  .node{position:relative;z-index:1;width:34px;height:34px;border-radius:50%;background:var(--card);border:2px solid var(--line);
    color:var(--ink2);display:grid;place-items:center;font-weight:800;font-size:15px;font-family:var(--ff-disp);box-shadow:var(--sh1);margin-top:4px}
  .unit.done .node{background:var(--wakaba);border-color:var(--wakaba);color:#fff}
  .unit.current .node{border-color:var(--sakura);color:var(--sakura);box-shadow:0 0 0 5px var(--sakura-tint)}
  .stop{flex:1;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 15px;box-shadow:var(--sh1);transition:transform .12s,box-shadow .15s,border-color .15s}
  .unit:active .stop{transform:scale(.99)}
  .unit.current .stop{border-color:var(--sakura);box-shadow:var(--sh2)}
  .stop-top{display:flex;align-items:center;gap:8px;margin-bottom:2px}
  .stop .ttl{display:block;font-family:var(--ff-disp);font-weight:800;font-size:15.5px;color:var(--ink);line-height:1.45}
  .stop .sub{font-size:12.5px;color:var(--ink2)}
  .pill-done{font-size:10.5px;font-weight:800;color:var(--wakaba);background:var(--wakaba-tint);padding:2px 9px;border-radius:20px}
  .pill-cur{font-size:10.5px;font-weight:800;color:#fff;background:var(--sakura);padding:2px 9px;border-radius:20px}

  /* lesson card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:24px 22px;box-shadow:var(--sh2);min-height:46vh}
  .card .step{font-family:var(--ff-disp);font-size:11.5px;letter-spacing:.1em;color:var(--sakura);font-weight:800}
  .card h2{font-family:var(--ff-disp);margin:7px 0 16px;font-size:21px;line-height:1.5;color:var(--ink)}
  .card p{margin:0 0 14px;font-size:16.5px}
  .card .big{font-size:16.5px;font-weight:700;color:var(--beni);background:var(--sakura-tint);border-radius:14px;padding:15px 17px;margin:6px 0 16px;line-height:1.65}
  .card .point{background:#fffdf6;border:1px solid var(--line);border-left:4px solid var(--amber);border-radius:0 12px 12px 0;padding:12px 15px;margin:6px 0 14px;font-size:15px;color:var(--ink)}
  .card ul{margin:0 0 14px;padding-left:2px;list-style:none}
  .card ul li{position:relative;padding:7px 0 7px 28px;font-size:16px;border-bottom:1px dashed var(--line)}
  .card ul li:last-child{border-bottom:none}
  .card ul li:before{content:"";position:absolute;left:6px;top:14px;width:8px;height:8px;border-radius:50%;background:var(--sakura)}
  .card .vs{display:flex;gap:10px;margin:4px 0 14px}
  .card .vs>div{flex:1;border-radius:13px;padding:13px;font-size:14px;line-height:1.6}
  .card .vs .a{background:#eef1f5;color:#3f5168}
  .card .vs .b{background:var(--sakura-tint);color:var(--beni)}
  .card .vs b{display:block;margin-bottom:5px;font-size:13px;font-family:var(--ff-disp);font-weight:800}

  .dots{display:flex;justify-content:center;gap:7px;margin:16px 0 0}
  .dots i{width:8px;height:8px;border-radius:50%;background:var(--line);transition:.3s}
  .dots i.on{background:var(--sakura);width:24px;border-radius:20px}

  /* quiz */
  .quiz h2{font-size:20px;margin:4px 0 6px}
  .qnum{font-family:var(--ff-disp);font-size:12px;color:var(--sakura);font-weight:800;letter-spacing:.05em}
  .q{font-family:var(--ff-disp);font-size:18px;font-weight:800;margin:10px 0 18px;line-height:1.55;color:var(--ink)}
  .opt{display:block;width:100%;text-align:left;background:var(--card);border:1.5px solid var(--line);border-radius:13px;padding:15px 16px;margin-bottom:11px;font-size:16px;font-family:inherit;cursor:pointer;font-weight:700;color:var(--ink);transition:transform .1s,border-color .15s}
  .opt:active{transform:scale(.99)}
  .opt.correct{border-color:var(--wakaba);background:var(--wakaba-tint);color:#4f7320}
  .opt.wrong{border-color:var(--ng);background:var(--ng-soft);color:var(--ng)}
  .opt:disabled{cursor:default}
  .opt{touch-action:manipulation}
  .quiz.answered .opt{pointer-events:none}
  .explain{background:var(--sakura-tint);border-radius:12px;padding:14px;font-size:15px;margin-top:6px;display:none;line-height:1.65;color:var(--ink)}
  .explain.show{display:block;animation:fade .3s}

  /* result */
  .result{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:32px 22px;box-shadow:var(--sh2)}
  .result .em{font-size:56px;margin-bottom:8px}
  .result h2{font-family:var(--ff-disp);margin:0 0 8px;font-size:23px;color:var(--ink)}
  .result p{font-size:16px;color:var(--ink2)}
  .score{font-family:var(--ff-disp);font-size:42px;font-weight:800;color:var(--sakura);margin:8px 0}

  /* certificate */
  .cert{background:#fffdf6;border:2px dashed var(--amber);border-radius:18px;padding:28px 22px;text-align:center;box-shadow:var(--sh2)}
  .cert .seal{width:66px;height:66px;border-radius:50%;background:var(--sakura);color:#fff;display:grid;place-items:center;margin:0 auto 14px;font-family:var(--ff-disp);font-size:15px;font-weight:800;box-shadow:0 4px 10px rgba(214,83,154,.35)}
  .cert h2{font-family:var(--ff-min);margin:0 0 4px;font-size:21px;color:var(--beni);letter-spacing:.04em}
  .cert .nm{font-family:var(--ff-min);font-size:25px;font-weight:800;margin:18px 0 6px;border-bottom:2px solid var(--line);padding-bottom:10px;color:var(--ink)}
  .cert .txt{font-size:14px;color:var(--ink2);margin:14px 0}
  .cert .dt{font-size:13px;color:var(--ink2)}

  .rec{border-radius:13px;padding:14px 16px;margin-top:16px;font-size:15px;font-weight:700;text-align:center;line-height:1.55}
  .rec span{display:block;font-size:12.5px;font-weight:500;color:var(--ink2);margin-top:4px}
  .rec.todo{background:var(--amber-soft,#f7eed7);border:1px solid #eccfa6;color:var(--amber)}
  .rec.done{background:var(--wakaba-tint);border:1px solid #cfe0ad;color:#4f7320}
  .rec.admin{background:#f2efe4;border:1px solid var(--line);color:var(--ink2);font-weight:500;font-size:13px}

  /* mascot + bubble */
  .mascot-wrap{text-align:center;margin:2px 0 10px}
  .mascot{width:150px;height:auto;display:block;margin:0 auto;filter:drop-shadow(0 7px 13px rgba(58,46,51,.18));animation:bob 2.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-7px) rotate(1deg)}}
  .bubble{display:inline-block;position:relative;background:#fff;border:2.5px solid var(--sakura);color:var(--beni);font-family:var(--ff-disp);font-weight:800;font-size:17px;padding:9px 18px;border-radius:20px;margin-bottom:10px;box-shadow:var(--sh1)}
  .bubble:after{content:"";position:absolute;left:50%;bottom:-11px;transform:translateX(-50%);border-width:11px 9px 0;border-style:solid;border-color:var(--sakura) transparent transparent}
  .bubble:before{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);border-width:8px 6px 0;border-style:solid;border-color:#fff transparent transparent;z-index:1}
  .maru-tap{position:relative;cursor:pointer}
  .maru-says{position:absolute;top:6px;left:50%;transform:translateX(-50%) translateY(-4px) scale(.85);background:#fff;border:2px solid var(--sakura);color:var(--beni);font-family:var(--ff-disp);font-weight:800;font-size:13px;line-height:1.45;text-align:center;padding:6px 13px;border-radius:15px;box-shadow:var(--sh2);max-width:84%;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:4}
  .maru-says.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  @keyframes wig{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
  .hero-maru.wig,.mascot.wig{animation:wig .42s ease!important}

  /* footer buttons */
  .footer{position:fixed;left:0;right:0;bottom:0;z-index:30;padding:14px 18px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--paper) 26%);max-width:480px;margin:0 auto}
  .btn{display:block;width:100%;border:none;border-radius:14px;padding:16px;font-family:var(--ff-disp);font-size:17px;font-weight:800;cursor:pointer;background:var(--sakura);color:#fff;box-shadow:0 6px 16px rgba(214,83,154,.30)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:#fff;color:var(--sakura);border:1.5px solid var(--line);box-shadow:none}
  .btn:disabled{background:#d8cfc2;color:#fff;box-shadow:none;cursor:default}
  .btn.sm{padding:13px;font-size:15px}
  .row2{display:flex;gap:10px}.row2 .btn{flex:1}

  @media print{.topbar,.footer,#recArea{display:none}.screen{padding:0}body,#app{background:#fff}.mascot{animation:none}}
  @media(prefers-reduced-motion:reduce){.mascot{animation:none}}
  rt{font-size:.58em;color:var(--ink2);font-weight:400}
  ruby{ruby-align:center}
  .test-note{font-size:12.5px;color:var(--beni);font-weight:700;background:var(--sakura-tint);border-radius:10px;padding:7px 11px;margin:2px 0 12px;display:inline-block}
  .review{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;box-shadow:var(--sh2);margin-top:14px}
  .review h3{font-family:var(--ff-disp);font-size:15px;margin:0 0 10px;color:var(--beni)}
  .review .ri{border-top:1px dashed var(--line);padding:11px 0}
  .review .ri:first-of-type{border-top:none}
  .review .rq{font-weight:800;font-size:14.5px;margin:0 0 4px}
  .review .ra{font-size:13.5px;color:var(--ok);font-weight:700;margin:0 0 3px}
  .review .rx{font-size:13px;color:var(--ink2);margin:0}

</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <button class="back" id="back">‹</button>
    <div class="title" id="ttl">BCPを学ぼう</div>
    <div class="fsctl"><button id="sndtgl" aria-label="音のオン・オフ">🔊</button><button id="fsdown" aria-label="文字を小さく">A−</button><button id="fsup" aria-label="文字を大きく">A＋</button></div>
    <div class="prog" id="topprog"></div>
  </div>
  <div class="screen" id="screen"></div>
  <div class="footer" id="footer"></div>
</div>

/* ============ 状態 ============ */
const STORE='asakura_bcp_learn_v1';
let st=load();
function load(){try{const d=JSON.parse(localStorage.getItem(STORE))||{};return {done:d.done||[],name:d.name||'',dept:d.dept||'',job:d.job||'',recorded:d.recorded||false};}catch(e){return {done:[],name:'',dept:'',job:'',recorded:false};}}
function persist(){try{localStorage.setItem(STORE,JSON.stringify(st));}catch(e){}}
const isDone=id=>st.done.includes(id);
function markDone(id){if(!isDone(id)){st.done.push(id);persist();}}
const allDone=()=>UNITS.every(u=>isDone(u.id));

  ttl=document.getElementById('ttl'),topprog=document.getElementById('topprog'),back=document.getElementById('back');

back.onclick=()=>{ if(view.name==='unit'||view.name==='quiz'||view.name==='result'||view.name==='cert') go({name:'home'}); };

function render(){
  back.style.display = view.name==='home' ? 'none':'flex';
  const n=st.done.length, tot=UNITS.length;
  topprog.textContent = `${n}/${tot}`;
  if(view.name==='home') renderHome();
  else if(view.name==='unit') renderUnit();
  else if(view.name==='quiz') renderQuiz();
  else if(view.name==='result') renderResult();
  else if(view.name==='cert') renderCert();
}

    <div class="hero-row">
      <div class="maru-tap" id="maruTap"><img class="hero-maru" src="${MARU}" alt="あさくら丸"></div>
      <div><span class="eyebrow">一乗谷友愛会 職員研修</span>

    </div>

      <div class="prog-label"><span>学習の進み</span><span>${n} / ${tot} 単元（${pct}％）</span></div></div>
  </div>`;
  h+=`<div class="name-box"><label>お名前（修了証・受講記録に表示）<span class="req-star">＊必須</span></label>
    <input id="nm" type="text" placeholder="例：あさくら丸" value="${esc(st.name)}">
    <div id="nmHint" class="nm-hint">※お名前の入力が必要です</div>
    <label style="margin-top:12px">所属</label>
    <select id="dp">${['',...DEPTS].map(d=>`<option value="${esc(d)}" ${d===st.dept?'selected':''}>${d||'選んでください'}</option>`).join('')}</select>
    <label style="margin-top:12px">職種</label>
    <select id="jb">${['',...JOBS].map(d=>`<option value="${esc(d)}" ${d===st.job?'selected':''}>${d||'選んでください'}</option>`).join('')}</select>
    </div>`;
  h+=`<div class="sec-h">学習の道のり</div><div class="path">`;
  const cur = allDone()? -1 : firstUndone();
  UNITS.forEach((u,i)=>{
    const done=isDone(u.id), isCur=(i===cur);
    h+=`<div class="unit ${done?'done':''} ${isCur?'current':''}" data-i="${i}">
      <div class="rail"><span class="node">${done?'✓':(i+1)}</span></div>
      <div class="stop"><div class="stop-top"><span class="eyebrow">${u.test?'総まとめ':'STEP '+String(i+1).padStart(2,'0')}</span>${done?'<span class="pill-done">完了</span>':(isCur?'<span class="pill-cur">いまここ</span>':'')}</div>
        <span class="ttl">${u.title}</span><span class="sub">${u.sub}</span></div></div>`;
  });
  h+=`</div>`;
  screen.innerHTML=h;
  document.getElementById('nm').addEventListener('input',e=>{st.name=e.target.value;persist();

    const hint=document.getElementById('nmHint'); if(hint&&nameOk())hint.style.display='none';});

    + `<button class="btn ghost sm" id="reset" style="margin-top:10px">🔄 次の人にかわる（リセット）</button>`;
  document.getElementById('f').onclick=()=> allDone()? go({name:'cert'}) : enterUnit(firstUndone());
  { const fb0=document.getElementById('f'); if(fb0&&!allDone())fb0.disabled=!nameOk(); }
  document.getElementById('reset').onclick=resetAll;
  const mt=document.getElementById('maruTap');if(mt)mt.onclick=()=>heroTalk(document.getElementById('maruSays'),mt.querySelector('.hero-maru'));
}
function firstUndone(){const i=UNITS.findIndex(u=>!isDone(u.id));return i<0?0:i;}
function nameOk(){return !!(st.name&&st.name.trim());}
function enterUnit(i){
  if(!nameOk()){
    const nm=document.getElementById('nm'); if(nm){nm.classList.add('miss');nm.focus();}
    const hint=document.getElementById('nmHint'); if(hint)hint.style.display='block';
    alert('お名前を入力してください（必須です）'); return;
  }
  const u=UNITS[i];
  if(u.test) go({name:'quiz',ui:i,qi:0,ok:0,answered:false});
  else go({name:'unit',ui:i,ci:0});
}

/* 次の人に交代するためのリセット（2重確認） */
function resetAll(){
  if(!confirm('【確認 1/2】次の方に交代します。\n今表示されている氏名・所属・職種と、学習の進捗をすべて消去します。よろしいですか？'))return;
  if(!confirm('【確認 2/2】本当に消去してよろしいですか？\nこの操作は元に戻せません。'))return;
  st={done:[],name:'',dept:'',job:'',recorded:false};
  try{localStorage.removeItem(STORE);}catch(e){}
  go({name:'home'});
}

/* ---- 単元（学習カード） ---- */
function renderUnit(){
  const u=UNITS[view.ui],c=u.cards[view.ci];ttl.textContent=u.title;
  let dots='';u.cards.forEach((_,i)=>dots+=`<i class="${i===view.ci?'on':''}"></i>`);
  screen.innerHTML=`<div class="card"><div class="step">STEP ${String(view.ui+1).padStart(2,'0')}　${u.title}</div><h2>${rubify(c.h)}</h2>${rubify(c.body)}</div>
    <div class="dots">${dots}</div>`;
  const last=view.ci===u.cards.length-1;
  footer.innerHTML=`<div class="row2">
    ${view.ci>0?'<button class="btn ghost" id="prev">‹ もどる</button>':''}
    <button class="btn" id="next">${last?'理解度チェックへ ›':'つぎへ ›'}</button></div>`;
  const pv=document.getElementById('prev');if(pv)pv.onclick=()=>go({name:'unit',ui:view.ui,ci:view.ci-1});
  document.getElementById('next').onclick=()=> last? go({name:'quiz',ui:view.ui,qi:0,ok:0,wrong:[],answered:false}) : go({name:'unit',ui:view.ui,ci:view.ci+1});
}

/* ---- クイズ ---- */
function renderQuiz(){
  const u=UNITS[view.ui],q=u.quiz[view.qi];ttl.textContent=u.test?u.title:u.title+'｜確認';
  const order=shuffle([...q.opts.keys()]);
  let opts=order.map(oi=>`<button class="opt" data-i="${oi}">${rubify(q.opts[oi])}</button>`).join('');
  const passN=u.test?Math.ceil(u.quiz.length*(u.passLine||0.8)):0;
  screen.innerHTML=`<div class="card quiz"><div class="qnum">問題 ${view.qi+1} / ${u.quiz.length}</div>
    ${u.test?`<div class="test-note">合格ライン：${u.quiz.length}問中 ${passN}問以上で修了</div>`:''}
    <div class="q">${rubify(q.q)}</div>${opts}
    <div class="explain" id="ex"></div></div>`;
  footer.innerHTML=`<button class="btn" id="next" disabled>こたえを選んでください</button>`;
  const nextBtn=document.getElementById('next'),ex=document.getElementById('ex');
  let answered=false;
  const lockAll=()=>{const card=screen.querySelector('.quiz');if(card)card.classList.add('answered');screen.querySelectorAll('.opt').forEach(b=>b.disabled=true);};
  [...screen.querySelectorAll('.opt')].forEach(btn=>{ btn.type='button';
    btn.addEventListener('pointerdown',e=>{ if(answered||!e.isPrimary){e.preventDefault();return;} sSelect(); },{passive:false});
    btn.addEventListener('click',()=>{
      if(answered)return; answered=true; lockAll();
      const i=+btn.dataset.i,correct=i===q.a;
      screen.querySelectorAll('.opt').forEach(b=>{if(+b.dataset.i===q.a)b.classList.add('correct');});
      if(!correct){btn.classList.add('wrong'); (view.wrong=view.wrong||[]).push(view.qi);}
      if(correct)view.ok++;
      correct?sCorrect():sWrong();
      ex.innerHTML=(correct?'⭕ 正解！ ':'❌ おしい！ ')+rubify(q.ex);ex.classList.add('show');
      const last=view.qi===u.quiz.length-1;
      nextBtn.disabled=false;nextBtn.textContent=last?'結果を見る ›':'つぎの問題 ›';
      nextBtn.onclick=()=> last? go({name:'result',ui:view.ui,ok:view.ok,tot:u.quiz.length,wrong:view.wrong||[]}) : go({name:'quiz',ui:view.ui,qi:view.qi+1,ok:view.ok,wrong:view.wrong||[],answered:false});
    });
  });
}

/* ---- 結果 ---- */
function renderResult(){
  const u=UNITS[view.ui];ttl.textContent='結果';
  const pass=view.ok/view.tot>=(u.passLine||0.5); // 通常は半分、総合テストは8割
  if(pass)markDone(u.id);
  if(pass)setTimeout(sCorrect,140);
  const _w=(view.wrong||[]).filter((v,idx,arr)=>arr.indexOf(v)===idx);
  let review='';
  if(_w.length){ review=`<div class="review"><h3>ふりかえり（まちがえた ${_w.length} 問）</h3>`+_w.map(qi=>{const qq=u.quiz[qi];return `<div class="ri"><p class="rq">${rubify(qq.q)}</p><p class="ra">正解：${rubify(qq.opts[qq.a])}</p><p class="rx">${rubify(qq.ex)}</p></div>`;}).join('')+`</div>`; }
  screen.innerHTML=`<div class="result"><div class="em">${pass?'🎉':'💪'}</div>
    <h2>${pass?(u.test?'合格！':'単元クリア！'):'もう少し！'}</h2>
    <div class="score">${view.ok} / ${view.tot} 問正解</div>
    <p>${pass?(u.test?'すべての確認に合格しました。修了です！':'この単元を修了しました。よくがんばりました。'):(u.test?'もう少しで合格です。もう一度挑戦しましょう。':'大事なところです。もう一度カードを読んで挑戦しましょう。')}</p></div>${review}`;
  const nextU=UNITS.findIndex((x,i)=>i>view.ui&&!isDone(x.id));
  if(pass){
    footer.innerHTML=`<div class="row2">
      <button class="btn ghost" id="home">一覧へ</button>
      <button class="btn" id="next">${allDone()?'🎓 修了証へ':(nextU>=0?'つぎの単元 ›':'一覧へ ›')}</button></div>`;
    document.getElementById('next').onclick=()=> allDone()? go({name:'cert'}) : (nextU>=0? enterUnit(nextU) : go({name:'home'}));
  }else{
    footer.innerHTML=`<div class="row2">
      <button class="btn ghost" id="home">一覧へ</button>
      <button class="btn" id="retry">${u.test?'もう一度挑戦':'もう一度よむ'}</button></div>`;
    document.getElementById('retry').onclick=()=>enterUnit(view.ui);
  }
  document.getElementById('home').onclick=()=>go({name:'home'});
}

/* ---- 修了証 ---- */
function renderCert(){
  ttl.textContent='修了証';
  const _now=new Date();const today=_now.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});const tnow=_now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  let recBlock='';
  if(formConfigured()){
    recBlock = st.recorded
      ? `<div class="rec done">✅ 受講記録：送信済み<br><span>管理者のGoogleフォームに記録されました</span></div>
         <button class="btn ghost sm" id="resend" style="margin-top:10px">もう一度送信する</button>`
      : `<div class="rec todo">📋 受講をまだ記録していません<br><span>下のボタンでフォームを開き、内容を確認して「送信」を押してください</span></div>`;
  }else{
    recBlock = `<div class="rec admin">ℹ️ 管理者の方へ：このファイル上部の設定にGoogleフォームのURLを登録すると、受講記録をここから送信できます。</div>`;
  }
  screen.innerHTML=`<div class="mascot-wrap"><div class="bubble" id="certBubble">がんばったまる！</div><img class="mascot" src="${MARU}" alt="あさくら丸"></div>
  <div class="cert">
    <div class="seal">お見事！</div>
    <h2>研修修了証</h2>
    <p class="txt">自然災害BCP 基礎研修</p>
    <div class="nm">${esc(st.name)||'（お名前）'} 様</div>
    ${(st.dept||st.job)?`<p class="txt" style="margin:0 0 8px">${[st.dept?'所属：'+esc(st.dept):'',st.job?'職種：'+esc(st.job):''].filter(Boolean).join('　／　')}</p>`:''}
    <p class="txt">あなたは上記の研修課程をすべて修了し、<br>BCPの基礎を身につけたことを証します。</p>
    <p class="dt">修了日時：${today} ${tnow}<br>社会福祉法人 一乗谷友愛会</p>
  </div>
  <div id="recArea">${recBlock}</div>
  <p style="text-align:center;font-size:13px;color:var(--soft);margin-top:14px">この研修は定期的に受け直し、訓練と合わせて理解を深めましょう。</p>`;

  const doSend=()=>{
    if(!st.name){alert('先に一覧画面でお名前を入力してください。');return;}
    const ok=confirm('【送信内容の確認（ご本人確認）】\n\n氏名：'+st.name+'\n所属：'+(st.dept||'(未選択)')+'\n職種：'+(st.job||'(未選択)')+'\n\n上記はあなたご自身の情報で間違いありませんか？\n「OK」を押すとフォームが開きます。次の画面で必ず「送信」を押してください。');
    if(!ok)return;
    window.open(buildPrefillUrl(),'_blank');
    st.recorded=true;persist();go({name:'cert'});
  };
  const rs=document.getElementById('resend');if(rs)rs.onclick=doSend;

  if(formConfigured() && !st.recorded){
    footer.innerHTML=`<button class="btn" id="rec">📋 受講を記録する</button>
      <div class="row2" style="margin-top:10px">
        <button class="btn ghost sm" id="home">一覧へ</button>
        <button class="btn ghost sm" id="print">修了証を印刷</button></div>
      <button class="btn ghost sm" id="reset" style="margin-top:8px">🔄 別の職員にかわる（リセット）</button>`;
    document.getElementById('rec').onclick=doSend;
  }else{
    footer.innerHTML=`<div class="row2">
      <button class="btn ghost" id="home">一覧へ</button>
      <button class="btn" id="print">印刷・保存</button></div>
      <button class="btn" id="reset" style="margin-top:10px;background:var(--ok)">🔄 別の職員にかわる（リセット）</button>`;
  }
  document.getElementById('print').onclick=()=>window.print();
  document.getElementById('home').onclick=()=>go({name:'home'});
  const rb=document.getElementById('reset');if(rb)rb.onclick=resetAll;
  const cm=document.querySelector('.mascot'),cb=document.getElementById('certBubble');if(cm&&cb){cm.style.cursor='pointer';cm.onclick=()=>certTalk(cb,cm);}
}

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

/* 文字サイズ（A−／A＋）端末ごとに保持・リセットの影響を受けない */
const FS_KEY='asakura_bcp_fs',FS=[1,1.15,1.3];
let fsi=(()=>{try{const v=+localStorage.getItem(FS_KEY);return [0,1,2].includes(v)?v:0;}catch(e){return 0;}})();
function applyFs(){try{document.getElementById('app').style.zoom=FS[fsi];localStorage.setItem(FS_KEY,fsi);}catch(e){}}
document.getElementById('fsup').onclick=()=>{if(fsi<FS.length-1){fsi++;applyFs();}};
document.getElementById('fsdown').onclick=()=>{if(fsi>0){fsi--;applyFs();}};
applyFs();

/* === 隠し要素：あさくら丸をタップすると「〜まる」口調で話す === */
let maruTaps=0;
const MARU_HELLO=['こんにちまる！','よく来てくれたまる〜','まってたまる！','やっほーまる！'];
const MARU_TIP=['いっしょに がんばるまる！','きょうも がんばるまる〜','ファイトまる！','えらいまる！','むりしないでまる〜','ひとやすみ してねまる','にこにこ まる〜','その ちょうしまる！','きみのこと おうえんしてるまる！','ぼちぼち いこうまる','すごいまる〜！','あさくら丸も がんばるまる！','たのしいまる？','げんき もらったまる！'];
const MARU_TICKLE=['くすぐったいまる〜！','もみすぎまる…！','めがまわるまる…！','おなかいっぱいまる…','ちょっと休むまる…ぐぅ','こちょこちょ しすぎまる！','ぐるぐるするまる〜'];
const MARU_SECRET=['ひみつだけど…あんこが好きまる…！','じつはあみぐるみまる…ふわふわまる','一乗谷うまれまる！','タップの達人まる…！','なかみは やさしさで できてるまる…！'];
function maruPick(a){return a[Math.floor(Math.random()*a.length)];}
function maruLine(){maruTaps++;
  if(maruTaps===1)return maruPick(MARU_HELLO);
  if(maruTaps%30===0)return '制作者は仲村まる！';
  if(maruTaps>=12&&Math.random()<0.5)return maruPick(MARU_TICKLE);
  if(maruTaps>=8&&Math.random()<0.14)return maruPick(MARU_SECRET);
  return maruPick(MARU_TIP);}
function maruWiggle(img){if(!img)return;img.classList.add('wig');setTimeout(()=>img.classList.remove('wig'),440);}
function heroTalk(bubble,img){if(!bubble)return;bubble.textContent=maruLine();bubble.classList.add('show');maruWiggle(img);clearTimeout(bubble._t);bubble._t=setTimeout(()=>bubble.classList.remove('show'),2600);}
function certTalk(bubble,img){if(!bubble)return;bubble.textContent=maruLine();maruWiggle(img);clearTimeout(bubble._t);bubble._t=setTimeout(()=>{bubble.textContent='がんばったまる！';},2800);}

/* === ふりがな・シャッフル・サウンド === */
const RUBY_DICT=[['垂直避難','すいちょくひなん'],['業務継続','ぎょうむけいぞく'],['足羽川','あすわがわ'],['避難場所','ひなんばしょ'],['避難','ひなん'],['参集','さんしゅう'],['氾濫','はんらん'],['被災','ひさい'],['安否','あんぴ'],['警戒','けいかい'],['想定','そうてい'],['復旧','ふっきゅう'],['防災','ぼうさい']];
const RUBY_RE=new RegExp('('+RUBY_DICT.map(p=>p[0]).join('|')+')','g');
const RUBY_MAP=Object.fromEntries(RUBY_DICT);
function rubify(html){ return String(html).replace(RUBY_RE,m=>'<ruby>'+m+'<rt>'+RUBY_MAP[m]+'</rt></ruby>'); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
let _ac=null, soundOn=(()=>{try{const v=localStorage.getItem('asakura_bcp_snd');return v===null?true:v==='1';}catch(e){return true;}})();
function _ctx(){ try{ if(!_ac)_ac=new (window.AudioContext||window.webkitAudioContext)(); if(_ac.state==='suspended')_ac.resume(); }catch(e){} return _ac; }
function beep(freqs,dur,type,vol){ if(!soundOn)return; const c=_ctx(); if(!c)return; const t0=c.currentTime; freqs.forEach((f,i)=>{ const o=c.createOscillator(),g=c.createGain(),st=t0+i*dur; o.type=type||'sine'; o.frequency.value=f; g.gain.setValueAtTime(0.0001,st); g.gain.linearRampToValueAtTime(vol||0.07,st+0.012); g.gain.exponentialRampToValueAtTime(0.0001,st+dur); o.connect(g).connect(c.destination); o.start(st); o.stop(st+dur+0.03); }); }
function sSelect(){ beep([520],0.07,'sine',0.04); }
function sCorrect(){ beep([660,880,1175],0.12,'sine',0.06); }
function sWrong(){ beep([320,200],0.18,'triangle',0.05); }
function updateSndBtn(){ const b=document.getElementById('sndtgl'); if(b)b.textContent=soundOn?'🔊':'🔈'; }
{ const sb=document.getElementById('sndtgl'); if(sb)sb.onclick=()=>{ soundOn=!soundOn; try{localStorage.setItem('asakura_bcp_snd',soundOn?'1':'0');}catch(e){} updateSndBtn(); if(soundOn){_ctx();sSelect();} }; updateSndBtn(); }

render();
</script>
